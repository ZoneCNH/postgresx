name: Docker Contract

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-contract:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      GOWORK: off
      XLIB_CONTEXT: ci_pull_request
      XLIB_ENABLE_VULNCHECK: "0"
      PGDATABASE: postgresx_test
      PGHOST: host.docker.internal
      PGPASSWORD: postgres
      PGPORT: "5432"
      PGUSER: postgres

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgresx_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgresx_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag v6.0.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Prepare BuildKit builder
        run: docker buildx inspect --bootstrap

      - name: Download modules
        run: GOWORK=off go mod download

      - name: Build PostgreSQL test DSN
        run: |
          scheme=postgres
          echo "POSTGRES_TEST_DSN=${scheme}://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable" >> "$GITHUB_ENV"

      - name: Docker toolchain check
        run: make docker-toolchain-check

      - name: Docker CI gate
        run: make docker-ci

      - name: Docker release gate
        env:
          XLIB_CONTEXT: release_verify
          VERSION: docker-contract-${{ github.run_id }}
        run: make docker-release-check

      - name: Summarize Docker evidence
        if: always()
        run: |
          {
            echo "## Docker contract evidence"
            echo "- Artifact: \`docker-contract-${{ github.run_id }}\`"
            echo "- Toolchain report: \`release/docker/toolchain-check.md\`"
            echo "- Release manifest: \`release/manifest/latest.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker contract evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: docker-contract-${{ github.run_id }}
          path: |
            release/docker/*.md
            release/manifest/latest.json
            release/manifest/latest.json.sha256
            release/debt/latest.json
            release/debt/latest.md
            release/debt/latest.json.sha256
          if-no-files-found: warn
